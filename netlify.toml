# Configuración de Netlify — sitio estático (una sola página HTML), sin paso de build.
[build]
  publish = "."

# Cabeceras de seguridad básicas para el sitio.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
